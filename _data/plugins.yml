- slug: aether
  name: Aether
  version: v1.2.8
  tagline: >-
    Headphone mixing correction. Harman EQ + spatial crossfeed for accurate, translatable mixes.
  description: >-
    Aether transforms headphones into precise mixing monitors. It applies a <strong>frequency-corrected Harman curve</strong>
    matched to typical headphone response, letting you hear your mix translate accurately to speakers. Its spatial
    <strong>crossfeed engine</strong> simulates stereo imaging and room acoustics on headphones — three realism modes
    (Standard / Lifelike / Hyperrealistic) let you dial in the right amount of "room feel" for your workflow.
    <br><br>
    A <strong>5-band Harman EQ</strong> with independent band types gives you surgical control over the correction curve. The crossfeed
    angle (30°–75° virtual speaker width) and amount controls let you match your headphone acoustics precisely.
    <strong>Real-time EQ graph</strong>, preset persistence, and direct value entry round out the toolset — no hunting for parameters.
    <br><br>
    Designed for use as a <strong>monitoring-chain plugin</strong> (not for mastering print), Aether sits post-master where its spatial
    simulation and headphone correction enhance your mixing decisions without coloring the mix you render.
  features:
    - "5-band Harman EQ with type-flexible bands (Off/LowShelf/Peak/HighShelf)"
    - "Spatial crossfeed simulation with 3 realism modes (Standard/Lifelike/Hyperrealistic)"
    - "Adjustable virtual speaker angle (30°–75°) with dynamic head-shadow LPF"
    - "Read-only EQ curve visualization (Amber transfer-function overlay)"
    - "Manual AutoEQ.app value entry — copy FREQ/GAIN/Q from AutoEQ"
    - "Preset persistence with automatic load-on-launch"
    - "Input peak metering with peak hold"
    - "Zero-latency monitoring DSP"
  tech:
    format: CLAP
    platforms: "Windows 10/11 x64, Linux x64, macOS (Apple Silicon)"
    language: Rust (Truce, Vizia, OpenGL)
  downloads:
    win: releases/aether-v1.2.8-win.zip
    linux: releases/aether-v1.2.8-linux.zip
    mac: releases/aether-v1.2.8-macos.zip
  manual_url: "https://github.com/LX-Audiolabs/lx-audiolabs.github.io/wiki/Aether"
  youtube_url: ""
